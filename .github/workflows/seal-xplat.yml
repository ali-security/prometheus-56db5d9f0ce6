---
name: seal-xplat
on:
  push:
  workflow_dispatch:

jobs:
  test:
    name: Go tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.24.x
      - name: Run Go tests
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            PKGS=$(go list ./... | grep -vE 'prometheus/(discovery|config|web)')
          else
            PKGS=$(go list ./...)
          fi
          go test $PKGS -vet=off
